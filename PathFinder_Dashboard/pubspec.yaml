name: pathfinder_dashboard
description: PathFinder EMOTE companion app - BLE sensor data dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_reactive_ble: ^5.3.1
  fl_chart: ^0.70.2
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  go_router: ^14.8.1
  logger: ^2.5.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  share_plus: ^10.1.4
  path: ^1.9.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/emotes/
